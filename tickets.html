<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entradas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui, -apple-system, Arial, sans-serif;
}

body{
    min-height:100vh;
    color:#f2f2f2;
}

/* 🌌 FONDO */
.bg{
    position:fixed;
    inset:0;
    z-index:-2;

    background-image:
    url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1800&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    filter: brightness(55%) contrast(120%) saturate(110%);
}

/* 🌈 OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    z-index:-1;

    background:
    radial-gradient(circle at top, rgba(255,0,60,.25), transparent 60%),
    radial-gradient(circle at bottom, rgba(0,180,255,.18), transparent 60%),
    linear-gradient(180deg, rgba(0,0,0,.4), rgba(0,0,0,.92));
}

/* 📱 APP */
.app{
    max-width:420px;
    margin:auto;
    padding:28px;
}

.header{
    text-align:center;
    margin-top:45px;
}

h1{
    font-size:28px;
    margin-top:12px;
    letter-spacing:3px;
    font-weight:500;
}

.subtitle{
    font-size:11px;
    opacity:.5;
    margin-top:8px;
    letter-spacing:2px;
}

/* INPUT */
.input-box{
    margin:20px 0;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.4);
    color:#fff;
    outline:none;
    font-size:12px;
}

/* CARD */
.card{
    margin-top:16px;
    padding:18px;
    border-radius:14px;

    background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.12);

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter: blur(12px);
}

.name{
    font-size:14px;
    font-weight:500;
}

.desc{
    font-size:11px;
    opacity:.6;
    margin-top:4px;
}

.price{
    font-size:13px;
    font-weight:600;
    margin-top:6px;
    color:rgba(255,255,255,.9);
}

/* BUTTON */
.btn{
    padding:9px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.25);

    background:rgba(255,255,255,.08);
    color:#fff;

    font-size:11px;
    font-weight:500;
    cursor:pointer;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:35px;
    font-size:10px;
    opacity:.3;
    letter-spacing:3px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="app">

    <div class="header">
        <h1>ENTRADAS</h1>
        <div class="subtitle">acceso al evento</div>
    </div>

    <!-- NOMBRE -->
    <div class="input-box">
        <input type="text" id="nombre" placeholder="Escribe tu nombre">
    </div>

    <!-- GENERAL -->
    <div class="card">
        <div>
            <div class="name">Entrada General</div>
            <div class="desc">acceso al evento y zona principal del party</div>
            <div class="price">$20.000</div>
        </div>

        <a class="btn" href="#" onclick="sendWA('Entrada General')">
            Comprar
        </a>
    </div>

    <!-- PARCHE -->
    <div class="card">
        <div>
            <div class="name">Parche de 4</div>
            <div class="desc">4 entradas + 1 botella de aguardiente para compartir en grupo</div>
            <div class="price">$85.000</div>
        </div>

        <a class="btn" href="#" onclick="sendWA('Parche de 4')">
            Comprar
        </a>
    </div>

    <div class="footer">
        acceso al evento
    </div>

</div>

<script>
function sendWA(tipoEntrada){

    let nombre = document.getElementById("nombre").value;

    if(nombre === ""){
        alert("Escribe tu nombre primero");
        return;
    }

    let numero = "573204566502";

    let mensaje =
    "Hola, soy " + nombre +
    " y quiero comprar: " + tipoEntrada +
    " del evento";

    let url =
    "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

    window.open(url, "_blank");
}
</script>

</body>
</html>
